<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#2563eb;--primary-light:#eff6ff;--primary-dark:#1d4ed8;
  --hot:#ef4444;--warm:#f97316;--cool:#3b82f6;--cold:#6b7280;
  --danger:#ef4444;--success:#22c55e;--warning:#f59e0b;
  --bg:#f1f5f9;--card:#fff;--text:#1e293b;--text-sub:#64748b;--border:#e2e8f0;
  --nav-h:56px;--tab-h:60px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-full:999px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ===== NAV ===== */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 14px;z-index:200;gap:8px}
.nav-title{font-size:16px;font-weight:700;flex:1}
.sync-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.75)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sync-dot.off{background:#f87171}
.nav-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:6px 13px;border-radius:var(--radius-full);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.nav-btn:active{opacity:.8}

/* ===== TABS ===== */
.tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:500;color:var(--text-sub);cursor:pointer}
.tab.active{color:var(--primary)}
.tab-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border)}
.tab.active .tab-icon{background:var(--primary-light);border-color:#bfdbfe}
.tab svg{width:20px;height:20px}

/* ===== PAGES ===== */
.page{position:fixed;top:var(--nav-h);left:0;right:0;bottom:var(--tab-h);display:none;overflow-y:auto}
.page.active{display:block}
#page-map{overflow:hidden;padding:0}
.page-scroll{padding:12px}

/* ===== MAP ===== */
#mapEl{width:100%;height:100%}
.map-filters{position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;z-index:10;overflow-x:auto;scrollbar-width:none;pointer-events:none}
.map-filters::-webkit-scrollbar{display:none}
.map-chip{flex-shrink:0;padding:5px 13px;border-radius:var(--radius-full);border:none;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);pointer-events:auto}
.map-chip.all{background:#fff;color:var(--text)}
.map-chip.hot{background:var(--hot);color:#fff}
.map-chip.warm{background:var(--warm);color:#fff}
.map-chip.cool{background:var(--cool);color:#fff}
.map-chip.cold{background:var(--cold);color:#fff}
.map-chip.active{box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 0 0 2px rgba(255,255,255,.5)}
.map-ctrls{position:absolute;bottom:20px;right:14px;display:flex;flex-direction:column;gap:10px;z-index:10}
.map-btn{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.14)}
.map-btn:active{transform:scale(.92)}
.map-btn svg{width:22px;height:22px}
.map-btn.primary{background:var(--primary);border-color:var(--primary)}
.ripple{position:fixed;width:56px;height:56px;border-radius:50%;background:rgba(37,99,235,.25);border:2px solid var(--primary);transform:translate(-50%,-50%) scale(0);transition:transform .6s,opacity .6s;pointer-events:none;z-index:9999;opacity:0}
.ripple.show{transform:translate(-50%,-50%) scale(1);opacity:1}

/* ===== LIST PANEL ===== */
.list-panel{position:absolute;top:0;bottom:0;left:0;width:min(320px,100%);background:var(--card);box-shadow:4px 0 16px rgba(0,0,0,.12);display:none;flex-direction:column;z-index:15}
.list-panel.open{display:flex}
.list-panel-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card)}
.list-panel-title{font-weight:700;font-size:14px;flex:1}
.list-panel-body{flex:1;overflow-y:auto}
.list-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.list-item:active{background:var(--bg)}
.list-item-info{flex:1;min-width:0}
.list-item-name{font-weight:600;font-size:14px}
.list-item-sub{font-size:12px;color:var(--text-sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-panel-footer{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px}
.list-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer}
.list-btn.export{background:#16a34a;color:#fff}
.list-btn.import{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--radius-md);padding:13px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.card-name{font-weight:600;font-size:15px;flex:1}
.badge{font-size:11px;padding:2px 9px;border-radius:var(--radius-full);font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge-hot{background:#fee2e2;color:var(--hot)}.badge-hot::before{background:var(--hot)}
.badge-warm{background:#ffedd5;color:var(--warm)}.badge-warm::before{background:var(--warm)}
.badge-cool{background:#dbeafe;color:var(--cool)}.badge-cool::before{background:var(--cool)}
.badge-cold{background:#f1f5f9;color:var(--cold)}.badge-cold::before{background:var(--cold)}
.card-sub{font-size:12px;color:var(--text-sub);margin-top:3px;display:flex;align-items:center;gap:4px}
.card-sub svg{flex-shrink:0;opacity:.6}
.alert-pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:700;margin-top:5px}
.alert-pill.over{background:var(--hot);color:#fff}
.alert-pill.today{background:var(--warm);color:#fff}
.alert-pill.soon{background:var(--warning);color:#fff}
.visit-badge{display:inline-flex;align-items:center;font-size:11px;padding:1px 7px;border-radius:var(--radius-full);background:var(--bg);color:var(--text-sub)}
.visit-badge.over{background:#fee2e2;color:var(--hot)}

/* ===== FILTERS ===== */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 15px;border-radius:var(--radius-full);border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ===== MODALS ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:18px}
.form-group{margin-bottom:13px}
.form-label{font-size:13px;color:var(--text-sub);display:block;margin-bottom:5px}
.form-input{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--primary);background:#fff}
textarea.form-input{height:70px;resize:none}
.form-section{border-top:2px solid var(--border);margin:16px 0 14px;padding-top:14px}
.form-section-title{font-size:14px;font-weight:700;margin-bottom:12px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:14px;border-radius:var(--radius-full);border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-cancel{background:var(--bg);color:var(--text-sub)}
.btn:active{opacity:.85}

/* ===== DETAIL PANEL ===== */
.detail{position:fixed;inset:0;background:var(--card);z-index:250;display:none;flex-direction:column;overflow-y:auto}
.detail.open{display:flex}
.detail-head{background:var(--primary);color:#fff;padding:14px 16px;padding-top:calc(var(--nav-h) - 4px);display:flex;align-items:center;gap:10px;flex-shrink:0}
.detail-back{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;padding:0 4px}
.detail-name{font-size:17px;font-weight:700;flex:1}
.detail-body{padding:14px;flex:1}
.info-row{display:flex;padding:10px 0;border-bottom:1px solid var(--border)}
.info-label{width:80px;font-size:13px;color:var(--text-sub);flex-shrink:0}
.info-value{font-size:14px;flex:1;line-height:1.5}
.section-title{font-size:12px;font-weight:700;color:var(--text-sub);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.06em}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.action-btn{padding:9px 15px;border-radius:var(--radius-full);border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.action-btn:active{opacity:.8}
.action-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.action-btn.green{background:var(--success);color:#fff;border-color:var(--success)}
.action-btn.danger{color:var(--danger);border-color:#fca5a5}

/* ===== HISTORY ITEMS ===== */
.hist-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.hist-icon{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hist-icon svg{width:16px;height:16px;color:#fff}
.hist-body{flex:1;min-width:0}
.hist-type{font-size:13px;font-weight:600}
.hist-meta{font-size:12px;color:var(--text-sub);margin-top:1px}
.hist-note{font-size:13px;margin-top:4px}
.hist-actions{display:flex;flex-direction:column;gap:5px}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px;display:flex;align-items:center;justify-content:center}
.icon-btn svg{width:15px;height:15px}
.icon-btn.edit{color:var(--primary)}
.icon-btn.del{color:var(--danger)}

/* ===== ALERT ITEMS ===== */
.alert-item{background:var(--card);border-radius:var(--radius-md);padding:13px;margin-bottom:9px;border-left:4px solid;cursor:pointer}
.alert-item.over{border-color:var(--hot)}
.alert-item.today{border-color:var(--warm)}
.alert-item.soon{border-color:var(--warning)}
.alert-tag{font-size:11px;font-weight:700;margin-bottom:4px;display:inline-flex;padding:2px 10px;border-radius:var(--radius-full);color:#fff}
.alert-item.over .alert-tag{background:var(--hot)}
.alert-item.today .alert-tag{background:var(--warm)}
.alert-item.soon .alert-tag{background:var(--warning)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:60px 20px;color:var(--text-sub)}
.empty svg{width:44px;height:44px;margin:0 auto 12px;display:block}
.empty p{font-size:14px;line-height:1.7}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:calc(var(--tab-h) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:9px 20px;border-radius:var(--radius-full);font-size:13px;opacity:0;transition:all .28s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== LOADING ===== */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="font-size:14px;color:var(--text-sub)">データを同期中...</p>
</div>

<!-- NAV -->
<nav class="nav">
  <span class="nav-title" style="display:flex;align-items:center;gap:8px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>営業CRM</span>
  <div class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncText">同期中</span></div>
  <button class="nav-btn" onclick="openCustomerModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>追加
  </button>
  <button class="nav-btn" onclick="openHistoryModal(null)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>記録
  </button>
</nav>

<!-- PAGES -->
<!-- MAP -->
<div class="page active" id="page-map">
  <div id="mapEl"></div>
  <div class="map-filters">
    <button class="map-chip all active" onclick="setMapFilter('all',this)">全て</button>
    <button class="map-chip hot" onclick="setMapFilter('hot',this)">ホット</button>
    <button class="map-chip warm" onclick="setMapFilter('warm',this)">ウォーム</button>
    <button class="map-chip cool" onclick="setMapFilter('cool',this)">クール</button>
    <button class="map-chip cold" onclick="setMapFilter('cold',this)">コールド</button>
  </div>
  <div class="map-ctrls">
    <button class="map-btn primary" onclick="addAtCurrentLocation()" title="現在地に追加">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="map-btn" onclick="goToCurrentLocation()" title="現在地" style="border-color:#2563eb">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><circle cx="12" cy="12" r="3" fill="#2563eb"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>
    <button class="map-btn" onclick="toggleAllBubbles()" title="全吹き出し" style="border-color:#f59e0b" id="bubbleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="map-btn" onclick="toggleListPanel()" title="一覧" style="border-color:#8b5cf6">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="#8b5cf6" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="#8b5cf6" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="#8b5cf6" stroke="none"/></svg>
    </button>
  </div>
  <!-- LIST PANEL -->
  <div class="list-panel" id="listPanel">
    <div class="list-panel-header">
      <span class="list-panel-title" id="listPanelTitle">ピン一覧</span>
      <button class="icon-btn" onclick="toggleListPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="list-panel-body" id="listPanelBody"></div>
    <div class="list-panel-footer">
      <button class="list-btn export" onclick="exportCSV()">CSV書き出し</button>
      <button class="list-btn import" onclick="document.getElementById('csvInput').click()">インポート</button>
    </div>
  </div>
</div>

<!-- CUSTOMERS -->
<div class="page" id="page-customers">
  <div class="page-scroll">
    <div class="chips" id="custChips">
      <div class="chip active" onclick="filterCustomers('all',this)">すべて</div>
      <div class="chip" onclick="filterCustomers('hot',this)"><span class="chip-dot" style="background:var(--hot)"></span>ホット</div>
      <div class="chip" onclick="filterCustomers('warm',this)"><span class="chip-dot" style="background:var(--warm)"></span>ウォーム</div>
      <div class="chip" onclick="filterCustomers('cool',this)"><span class="chip-dot" style="background:var(--cool)"></span>クール</div>
      <div class="chip" onclick="filterCustomers('cold',this)"><span class="chip-dot" style="background:var(--cold)"></span>コールド</div>
    </div>
    <div id="custList"></div>
  </div>

/* ===== UTILS ===== */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function dayDiff(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.floor((new Date(d+'T00:00:00')-t)/86400000)}
function setSyncStatus(ok){document.getElementById('syncDot').className='sync-dot'+(ok?'':' off');document.getElementById('syncText').textContent=ok?'同期済み':'オフライン'}
function closeOverlay(id){document.getElementById(id).classList.remove('open')}

/* ===== FIREBASE ===== */
function addC(data){data.createdAt=Date.now();return window.$add(window.$col(window.$db,'customers'),data)}
function updC(id,data){return window.$upd(window.$doc(window.$db,'customers',id),data)}
function delC(id){return window.$del(window.$doc(window.$db,'customers',id))}
function addH(data){data.timestamp=Date.now();return window.$add(window.$col(window.$db,'histories'),data)}

function startSync(){
  if(!window.$db)return;
  // customers
  window.$snap(window.$q(window.$col(window.$db,'customers'),window.$ord('createdAt','desc')),snap=>{
    const prev=state.customers.map(c=>c.id);
    state.customers=[];
    snap.forEach(d=>state.customers.push({id:d.id,...d.data()}));
    const curr=state.customers.map(c=>c.id);
    // remove deleted markers
    prev.filter(id=>!curr.includes(id)).forEach(id=>{
      if(state.markers[id]){state.markers[id].setMap(null);delete state.markers[id]}
      if(state.infoWindows[id]){state.infoWindows[id].close();delete state.infoWindows[id]}
      delete state.deletingIds[id];
    });
    setSyncStatus(true);
    renderAll();
    document.getElementById('loading').style.display='none';
  },()=>{setSyncStatus(false);document.getElementById('loading').style.display='none'});
  // histories
  window.$snap(window.$q(window.$col(window.$db,'histories'),window.$ord('timestamp','desc')),snap=>{
    state.histories=[];
    snap.forEach(d=>state.histories.push({id:d.id,...d.data()}));

    renderAll();

/* ===== MAP ===== */
window._initMap=function(){
  state.map=new google.maps.Map(document.getElementById('mapEl'),{
    center:{lat:35.6812,lng:139.7671},zoom:17,
    mapTypeControl:false,streetViewControl:false,fullscreenControl:false,
    gestureHandling:'greedy',zoomControl:false
  });

  // ===== PC: 長押し登録 =====
  let pcTimer;
  state.map.addListener('mousedown',e=>{
    pcTimer=setTimeout(()=>addAtLatLng(e.latLng.lat(),e.latLng.lng()),700);
  });
  state.map.addListener('mouseup',()=>clearTimeout(pcTimer));
  state.map.addListener('dragstart',()=>clearTimeout(pcTimer));

  // ===== スマホ: 長押し登録（ピンチ完全排除・最終版）=====
  const mapDiv=document.getElementById('mapEl');
  let touchTimer=null;
  let touchStartX=0,touchStartY=0;
  let touchActive=false;
  let pinchCooldown=false;    // ピンチ後の冷却期間フラグ
  let pinchCoolTimer=null;    // 冷却タイマー
  const LONG_PRESS_MS=750;    // 長押し判定時間（余裕を持たせる）
  const PINCH_COOL_MS=600;    // ピンチ後に登録を無効化する時間

  mapDiv.addEventListener('touchstart',function(e){
    // ピンチ冷却中は全て無視
    if(pinchCooldown){
      clearTimeout(touchTimer);
      touchActive=false;
      return;
    }
    // 2本指以上はピンチ → クールダウン開始
    if(e.touches.length>=2){
      touchActive=false;
      clearTimeout(touchTimer);
      pinchCooldown=true;
      clearTimeout(pinchCoolTimer);
      pinchCoolTimer=setTimeout(function(){pinchCooldown=false;},PINCH_COOL_MS);
      return;
    }
    // 1本指 → 長押しタイマー開始
    touchActive=true;
    const t=e.touches[0];
    touchStartX=t.clientX;
    touchStartY=t.clientY;
    clearTimeout(touchTimer);
    touchTimer=setTimeout(function(){
      if(!touchActive||pinchCooldown)return;
      showRipple(touchStartX,touchStartY);
      const proj=state.map.getProjection();
      const bounds=state.map.getBounds();
      if(!proj||!bounds)return;
      const mb=mapDiv.getBoundingClientRect();
      const ne=proj.fromLatLngToPoint(bounds.getNorthEast());
      const sw=proj.fromLatLngToPoint(bounds.getSouthWest());
      const scale=Math.pow(2,state.map.getZoom());
      const ll=proj.fromPointToLatLng(new google.maps.Point(
        sw.x+(touchStartX-mb.left)/scale,
        ne.y+(touchStartY-mb.top)/scale
      ));
      addAtLatLng(ll.lat(),ll.lng());
    },LONG_PRESS_MS);
  },{passive:true});

  mapDiv.addEventListener('touchmove',function(e){
    // 2本指になった瞬間 → ピンチ確定・クールダウン開始
    if(e.touches.length>=2){
      touchActive=false;
      clearTimeout(touchTimer);
      pinchCooldown=true;
      clearTimeout(pinchCoolTimer);
      pinchCoolTimer=setTimeout(function(){pinchCooldown=false;},PINCH_COOL_MS);
      return;
    }
    // ドラッグ検知（8px以上動いたらキャンセル）
    if(e.touches.length===1&&touchActive){
      const dx=e.touches[0].clientX-touchStartX;
      const dy=e.touches[0].clientY-touchStartY;
      if(Math.sqrt(dx*dx+dy*dy)>8){
        clearTimeout(touchTimer);
        touchActive=false;
      }
    }
  },{passive:true});

  mapDiv.addEventListener('touchend',function(e){
    if(e.touches.length===0){
      touchActive=false;
      clearTimeout(touchTimer);
      // ピンチ後の1本指解放もクールダウン対象
      if(pinchCooldown){
        clearTimeout(pinchCoolTimer);
        pinchCoolTimer=setTimeout(function(){pinchCooldown=false;},PINCH_COOL_MS);
      }
    }
  },{passive:true});

  mapDiv.addEventListener('touchcancel',function(){
    touchActive=false;
    pinchCooldown=true;
    clearTimeout(touchTimer);
    clearTimeout(pinchCoolTimer);
    pinchCoolTimer=setTimeout(function(){pinchCooldown=false;},PINCH_COOL_MS);
  },{passive:true});

  updateMarkers();
  goToCurrentLocation();
};

function makePinSVG(color){
  return encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><ellipse cx="14" cy="34" rx="5" ry="2" fill="rgba(0,0,0,0.15)"/><path d="M14 1C7.4 1 2 6.4 2 13c0 8 12 22 12 22s12-14 12-22C26 6.4 20.6 1 14 1z" fill="${color}"/><circle cx="14" cy="13" r="7" fill="white"/></svg>`);
}

function addMarker(c){
  if(state.deletingIds[c.id])return;
  const marker=new google.maps.Marker({
    position:{lat:c.lat,lng:c.lng},map:state.map,title:c.name,

    zIndex:{hot:4,warm:3,cool:2,cold:1}[c.status]||1
  });
  const hist=getHist(c.id);
  const latest=getLatest(c.id);
  const sc=STATUS_COLOR[c.status]||'#2563eb';
  const content=`<div style="font-family:-apple-system,sans-serif;padding:4px;min-width:180px;max-width:230px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span style="font-weight:700;font-size:14px;color:#1e293b;">${c.name}</span>
      <span style="font-size:10px;padding:1px 7px;border-radius:999px;background:${sc}20;color:${sc};font-weight:700;">${STATUS_LABEL[c.status]||''}</span>
    </div>
    ${c.needs?`<div style="font-size:12px;color:#475569;margin-bottom:4px;">${c.needs}</div>`:''}
    ${c.memo?`<div style="font-size:12px;color:#475569;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">${c.memo}</div>`:''}

      ${latest?`<div style="font-size:13px;font-weight:600;color:#1e293b;">${TYPE_LABEL[latest.type]||''}</div>
      <div style="font-size:11px;color:#64748b;margin-top:2px;">${latest.date}${latest.time?' '+latest.time:''}</div>
      ${latest.note?`<div style="font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">${latest.note}</div>`:''}`
      :'<div style="font-size:12px;color:#94a3b8;">履歴なし</div>'}
    </div>

  const iw=new google.maps.InfoWindow({content});
  // PC hover
  marker.addListener('mouseover',()=>iw.open(state.map,marker));
  marker.addListener('mouseout',()=>{if(!state.allBubbles)iw.close()});
  // Click → open detail
  marker.addListener('click',()=>openDetail(c.id));

  state.infoWindows[c.id]=iw;
  if(state.allBubbles)iw.open(state.map,marker);

// ④ Geocoderキャッシュ（localStorage）
const GEO_CACHE_KEY='crm_geo_cache';
function getGeoCache(){try{return JSON.parse(localStorage.getItem(GEO_CACHE_KEY)||'{}')}catch{return{}}}
function setGeoCache(addr,lat,lng){
  try{const c=getGeoCache();c[addr]={lat,lng,ts:Date.now()};localStorage.setItem(GEO_CACHE_KEY,JSON.stringify(c))}catch{}
}

function geocodeAndAdd(c){
  if(!c.address||!google?.maps?.Geocoder)return;
  // キャッシュを確認（同じ住所なら即座に使用）
  const cache=getGeoCache();
  if(cache[c.address]){
    const{lat,lng}=cache[c.address];
    updC(c.id,{lat,lng}); // Firestoreにも保存して次回以降はAPI不要
    addMarker({...c,lat,lng});
    return;
  }
  // API呼び出し（lat/lngがない場合のみ・1回限り）
  new google.maps.Geocoder().geocode({address:c.address,region:'JP'},(res,status)=>{
    if(status==='OK'&&res[0]){
      const lat=res[0].geometry.location.lat(),lng=res[0].geometry.location.lng();
      setGeoCache(c.address,lat,lng); // キャッシュに保存
      updC(c.id,{lat,lng});           // Firestoreに保存（以降API不要）
      addMarker({...c,lat,lng});
    }else{
      console.warn('Geocode failed:',status,c.address);
      // 失敗してもリトライしない（API制限保護）
    }
  });
}

function updateMarkers(){
  if(!state.map)return;
  const existIds=Object.keys(state.markers);
  const currIds=state.customers.map(c=>c.id);
  // remove stale
  existIds.filter(id=>!currIds.includes(id)||state.deletingIds[id]).forEach(id=>{
    state.markers[id]?.setMap(null);delete state.markers[id];
    state.infoWindows[id]?.close();delete state.infoWindows[id];
  });
  // add/update
  state.customers.filter(c=>(state.mapFilter==='all'||c.status===state.mapFilter)&&!state.deletingIds[c.id]).forEach(c=>{
    if(state.markers[c.id]){
      // update icon if status changed
      state.markers[c.id].setIcon({url:`data:image/svg+xml,${makePinSVG(STATUS_COLOR[c.status]||'#2563eb')}`,scaledSize:new google.maps.Size(28,36),anchor:new google.maps.Point(14,36)});
      // update info window content
      if(state.infoWindows[c.id]){
        const hist=getHist(c.id);
        const latest=getLatest(c.id);
        const sc=STATUS_COLOR[c.status]||'#2563eb';
        state.infoWindows[c.id].setContent(`<div style="font-family:-apple-system,sans-serif;padding:4px;min-width:180px;max-width:230px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <span style="font-weight:700;font-size:14px;color:#1e293b;">${c.name}</span>
            <span style="font-size:10px;padding:1px 7px;border-radius:999px;background:${sc}20;color:${sc};font-weight:700;">${STATUS_LABEL[c.status]||''}</span>
          </div>
          ${c.needs?`<div style="font-size:12px;color:#475569;margin-bottom:4px;">${c.needs}</div>`:''}
          <div style="background:#f1f5f9;border-radius:8px;padding:7px 9px;">
            <div style="font-size:11px;color:#64748b;margin-bottom:3px;">直近の履歴</div>
            ${latest?`<div style="font-size:13px;font-weight:600;">${TYPE_LABEL[latest.type]||''}</div>
            <div style="font-size:11px;color:#64748b;">${latest.date}${latest.time?' '+latest.time:''}</div>
            ${latest.note?`<div style="font-size:12px;margin-top:3px;">${latest.note}</div>`:''}`:'<div style="font-size:12px;color:#94a3b8;">履歴なし</div>'}
          </div>
        </div>`);
      }
      return;
    }
    if(c.lat!=null&&c.lng!=null&&!isNaN(c.lat)&&!isNaN(c.lng)){
      addMarker(c); // lat/lng確定済み → APIを絶対に叩かない
    }else if(c.address&&!state.deletingIds[c.id]){
      geocodeAndAdd(c); // アドレスのみ → キャッシュ確認後にAPI
    }
  });
  // hide filtered
  state.customers.forEach(c=>{
    if(!state.markers[c.id])return;
    const show=(state.mapFilter==='all'||c.status===state.mapFilter)&&!state.deletingIds[c.id];
    state.markers[c.id].setVisible(show);
  });
  renderListPanel();
}

function setMapFilter(f,el){
  state.mapFilter=f;
  document.querySelectorAll('.map-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  updateMarkers();renderListPanel();
}

function goToCurrentLocation(){
  if(!navigator.geolocation||!state.map)return;
  navigator.geolocation.getCurrentPosition(p=>{
    const ll={lat:p.coords.latitude,lng:p.coords.longitude};
    state.map.panTo(ll);
    if(state.myLocMarker)state.myLocMarker.setMap(null);
    if(state.myLocRing)state.myLocRing.setMap(null);
    state.myLocRing=new google.maps.Marker({position:ll,map:state.map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:22,fillColor:'#4285F4',fillOpacity:.15,strokeColor:'#4285F4',strokeWeight:1.5},zIndex:998});
    state.myLocMarker=new google.maps.Marker({position:ll,map:state.map,title:'現在地',icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#4285F4',fillOpacity:1,strokeColor:'#fff',strokeWeight:3},zIndex:999});
  });
}

function toggleAllBubbles(){
  state.allBubbles=!state.allBubbles;
  Object.entries(state.markers).forEach(([id,m])=>{
    if(state.allBubbles)state.infoWindows[id]?.open(state.map,m);

function toggleListPanel(){
  const p=document.getElementById('listPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))renderListPanel();
}

function renderListPanel(){
  const body=document.getElementById('listPanelBody');
  if(!body)return;
  const arr=state.customers.filter(c=>state.mapFilter==='all'||c.status===c.status);
  const filtered=state.customers.filter(c=>state.mapFilter==='all'||c.status===state.mapFilter);

  if(!filtered.length){body.innerHTML='<div class="empty"><p>該当する顧客がいません</p></div>';return;}
  const hist=id=>getLatest(id);

function focusPin(id){
  const c=state.customers.find(x=>x.id===id);
  if(!c||c.lat==null)return;
  state.map?.panTo({lat:c.lat,lng:c.lng});
  state.map?.setZoom(17);
  if(state.infoWindows[id]&&state.markers[id])state.infoWindows[id].open(state.map,state.markers[id]);
}

function addAtCurrentLocation(){
  if(!navigator.geolocation){alert('位置情報が使えません');return}
  toast('現在地を取得中...');
  navigator.geolocation.getCurrentPosition(p=>addAtLatLng(p.coords.latitude,p.coords.longitude),()=>toast('位置情報の取得に失敗しました'));
}

function cleanAddress(fa){
  if(!fa)return'';
  return fa
    .replace(/^日本[、,，。\s]*/g,'')  // 先頭の「日本、」を除去
    .replace(/〒[\d\-]+\s*/g,'')      // 「〒xxx-xxxx」をどこでも除去
    .replace(/^日本\s*/g,'')            // 残った「日本」を除去
    .replace(/,\s*日本\s*$/g,'')       // 末尾の「, 日本」を除去
    .trim();
}

function addAtLatLng(lat,lng){
  if(!google?.maps?.Geocoder){openCustomerModal('',lat,lng);return}
  toast('住所を取得中...');
  new google.maps.Geocoder().geocode({location:{lat,lng},language:'ja'},(res,status)=>{
    let addr='';
    if(status==='OK'&&res?.length){
      // 最も詳細な住所を選ぶ（丁目・番地レベルを優先）
      const candidates=res
        .map(r=>cleanAddress(r.formatted_address||''))
        .filter(a=>a.length>5);
      // 都道府県を含む最初の候補を採用
      addr=candidates.find(a=>/[都道府県]/.test(a))||candidates[0]||'';
    }
    openCustomerModal(addr,lat,lng);
  });
}

let pendingLatLng=null;
function openCustomerModal(prefillAddr='',lat=null,lng=null){
  state.editCustId=null;pendingLatLng=lat!=null?{lat,lng}:null;
  document.getElementById('custModalTitle').textContent=prefillAddr?'この場所に顧客追加':'顧客を追加';
  document.getElementById('f_name').value='';document.getElementById('f_phone').value='';
  document.getElementById('f_status').value='hot';document.getElementById('f_address').value=prefillAddr;
  document.getElementById('f_needs').value='';document.getElementById('f_next').value='';
  document.getElementById('f_memo').value='';
  document.getElementById('firstHistSection').style.display='block';
  const now=new Date();
  document.getElementById('fh_type').value='visit';
  document.getElementById('fh_date').value=now.toISOString().split('T')[0];
  document.getElementById('fh_time').value=now.toTimeString().slice(0,5);
  document.getElementById('fh_note').value='';
  document.getElementById('custOverlay').classList.add('open');
}

function saveCustomer(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){alert('氏名を入力してください');return}
  const data={
    name,phone:document.getElementById('f_phone').value.trim(),
    status:document.getElementById('f_status').value,
    address:document.getElementById('f_address').value.trim(),
    needs:document.getElementById('f_needs').value.trim(),
    nextVisit:document.getElementById('f_next').value,
    memo:document.getElementById('f_memo').value.trim(),
    lat:null,lng:null
  };
  if(state.editCustId){
    const orig=state.customers.find(c=>c.id===state.editCustId);
    if(orig&&orig.address!==data.address){data.lat=null;data.lng=null}
    else if(orig){data.lat=orig.lat??null;data.lng=orig.lng??null}
    updC(state.editCustId,data).then(()=>toast('顧客情報を更新しました'));
  }else{
    if(pendingLatLng){data.lat=pendingLatLng.lat;data.lng=pendingLatLng.lng;pendingLatLng=null}
    addC(data).then(ref=>{
      const hDate=document.getElementById('fh_date').value;
      if(hDate)addH({customerId:ref.id,type:document.getElementById('fh_type').value,
        date:hDate,time:document.getElementById('fh_time').value,
        note:document.getElementById('fh_note').value.trim(),statusChange:null});
      toast('顧客を追加しました');
    });
  }
  closeOverlay('custOverlay');
}

function editCustomer(){
  const c=state.customers.find(x=>x.id===state.detailId);
  if(!c)return;
  state.editCustId=state.detailId;
  document.getElementById('custModalTitle').textContent='顧客を編集';
  document.getElementById('f_name').value=c.name;document.getElementById('f_phone').value=c.phone||'';
  document.getElementById('f_status').value=c.status;document.getElementById('f_address').value=c.address||'';
  document.getElementById('f_needs').value=c.needs||'';document.getElementById('f_next').value=c.nextVisit||'';
  document.getElementById('f_memo').value=c.memo||'';
  document.getElementById('firstHistSection').style.display='none';
  closeDetail();
  document.getElementById('custOverlay').classList.add('open');
}

function deleteCustomer(){
  if(!confirm('この顧客を削除しますか？'))return;
  const id=state.detailId;closeDetail();
  state.deletingIds[id]=true;
  if(state.markers[id]){state.markers[id].setMap(null);delete state.markers[id]}
  if(state.infoWindows[id]){state.infoWindows[id].close();delete state.infoWindows[id]}
  delC(id).then(()=>{
    getHist(id).forEach(h=>delH(h.id));
    toast('顧客を削除しました');
    setTimeout(()=>delete state.deletingIds[id],3000);
  });
  renderListPanel();
}

function renderCustomers(){
  const el=document.getElementById('custList');
  const arr=state.customers.filter(c=>state.custFilter==='all'||c.status===state.custFilter);
  if(!arr.length){el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>顧客がいません<br>右上の「追加」から追加してください</p></div>`;return}
  el.innerHTML=arr.map(c=>{
    const d=dayDiff(c.nextVisit);
    let alert='';
    if(d!==null){
      if(d<0)alert=`<span class="alert-pill over">訪問超過 ${Math.abs(d)}日</span>`;
      else if(d===0)alert=`<span class="alert-pill today">今日が訪問日</span>`;
      else if(d<=3)alert=`<span class="alert-pill soon">${d}日後に訪問</span>`;
    }
    const visits=getVisitCount(c.id);
    const lh=getLatest(c.id);
    return `<div class="card" onclick="openDetail('${c.id}')">
      <div class="card-row">
        <span class="card-name">${c.name}</span>
        <span class="badge badge-${c.status}">${STATUS_LABEL[c.status]||''}</span>
        ${visits>0?`<span class="visit-badge${visits>=5?' over':''}">訪${visits}</span>`:''}
      </div>
      ${c.phone?`<div class="card-sub"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${c.phone}</div>`:''}
      ${c.address?`<div class="card-sub"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.address}</div>`:''}
      ${lh?`<div class="card-sub"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>最終: ${lh.date} ${TYPE_LABEL[lh.type]||''}</div>`:''}
      ${alert}
    </div>`;
  }).join('');
}

function filterCustomers(f,el){
  state.custFilter=f;
  document.querySelectorAll('#custChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderCustomers();
}

/* ===== HISTORIES RENDER ===== */
function renderHistories(){
  const el=document.getElementById('histList');
  if(!state.histories.length){el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>履歴がありません</p></div>`;return}
  el.innerHTML=state.histories.map(h=>{
    const c=state.customers.find(x=>x.id===h.customerId);
    return `<div class="card" style="cursor:default">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="hist-icon" style="background:${TYPE_COLOR[h.type]||'#64748b'}">${svgIcon(h.type)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:15px">${c?.name||'不明'}</div>
          <div style="font-size:12px;color:var(--text-sub);margin-top:2px">${TYPE_LABEL[h.type]||''} | ${h.date}${h.time?' '+h.time:''}</div>
          ${h.note?`<div style="font-size:13px;margin-top:5px">${h.note}</div>`:''}
        </div>
        <div class="hist-actions">
          <button class="icon-btn edit" onclick="editHistoryItem('${h.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn del" onclick="deleteHistItem('${h.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ===== ALERTS RENDER ===== */
function renderAlerts(){
  const el=document.getElementById('alertList');
  let over=[],today=[],soon=[];
  state.customers.forEach(c=>{
    if(!c.nextVisit)return;
    const d=dayDiff(c.nextVisit);
    if(d<0)over.push({c,d});
    else if(d===0)today.push({c,d});
    else if(d<=3)soon.push({c,d});
  });
  over.sort((a,b)=>a.d-b.d);soon.sort((a,b)=>a.d-b.d);
  if(!over.length&&!today.length&&!soon.length){
    el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p>アラートはありません</p></div>`;return;
  }
  const item=(cls,tag,c)=>`<div class="alert-item ${cls}" onclick="openDetail('${c.id}')">
    <span class="alert-tag">${tag}</span>
    <div style="font-weight:600;font-size:15px;margin-top:4px">${c.name}</div>
    ${c.address?`<div style="font-size:12px;color:var(--text-sub);margin-top:2px">${c.address}</div>`:''}
    <div style="font-size:12px;color:var(--text-sub);margin-top:2px">${c.nextVisit}</div>
  </div>`;
  el.innerHTML=
    over.map(({c,d})=>item('over',`訪問超過 ${Math.abs(d)}日`,c)).join('')+
    today.map(({c})=>item('today','今日が訪問日',c)).join('')+
    soon.map(({c,d})=>item('soon',`${d}日後に訪問`,c)).join('');
}

/* ===== CSV EXPORT ===== */
function exportCSV(){
  const maxH=Math.max(0,...state.customers.map(c=>getHist(c.id).length));
  const hdr=['氏名','電話','ステータス','住所','ニーズ','次回訪問','メモ'];
  for(let i=1;i<=maxH;i++)hdr.push(`履歴${i}_タイプ`,`履歴${i}_日付`,`履歴${i}_時刻`,`履歴${i}_メモ`,`履歴${i}_ステータス変更`);
  const rows=state.customers.map(c=>{
    const ch=getHist(c.id);
    const r=[c.name||'',c.phone||'',STATUS_LABEL[c.status]||'',c.address||'',c.needs||'',c.nextVisit||'',c.memo||''];
    for(let i=0;i<maxH;i++){const h=ch[i];r.push(h?TYPE_LABEL[h.type]||'':'',h?h.date||'':'',h?h.time||'':'',h?h.note||'':'',h&&h.statusChange?STATUS_LABEL[h.statusChange]||'':'')}
    return r.map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',');
  });
  // 全履歴
  const hdr2=['顧客名','ステータス','タイプ','日付','時刻','メモ','ステータス変更'];
  const rows2=state.histories.map(h=>{
    const c=state.customers.find(x=>x.id===h.customerId);
    return [c?.name||'不明',c?STATUS_LABEL[c.status]||'':'',TYPE_LABEL[h.type]||'',h.date||'',h.time||'',h.note||'',h.statusChange?STATUS_LABEL[h.statusChange]||'':''].map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',');
  });
  const csv='\uFEFF【顧客一覧】\n'+hdr.join(',')+'\n'+rows.join('\n')+'\n\n【営業履歴】\n'+hdr2.join(',')+'\n'+rows2.join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`営業CRM_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast(`CSV書き出し完了（顧客${state.customers.length}件・履歴${state.histories.length}件）`);
}

/* ===== CSV IMPORT ===== */
function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result.replace(/^\uFEFF/,'');
    const lines=text.split('\n').filter(l=>l.trim()&&!l.startsWith('【'));
    if(lines.length<2){alert('データがありません');return}
    const sMap={'ホット':'hot','ウォーム':'warm','クール':'cool','コールド':'cold',hot:'hot',warm:'warm',cool:'cool',cold:'cold'};
    let count=0;
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].match(/(".*?"|[^,]+)/g)||[];
      const v=cols.map(c=>c.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
      const name=v[0];if(!name)continue;
      const existing=state.customers.find(c=>c.name===name&&c.phone===(v[1]||''));
      const data={name,phone:v[1]||'',status:sMap[v[2]]||'cool',address:v[3]||'',needs:v[4]||'',nextVisit:v[5]||'',memo:v[6]||'',lat:null,lng:null};
      if(existing)updC(existing.id,data);
      else addC(data);
      count++;
    }
    toast(`${count}件をインポートしました`);
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
}

/* ===== OVERLAY CLOSE ON BACKDROP ===== */
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
