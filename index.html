<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>営業CRM Pro</title>
<style>
  :root { --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --gray: #64748b; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
  body { margin: 0; background: #f8fafc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  
  /* フラットデザイン：アイコンスタイル */
  .icon-badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; color: white; width: 32px; height: 32px; flex-shrink: 0; }
  .bg-visit { background: #3b82f6; } .bg-call { background: #22c55e; } .bg-contract { background: #f59e0b; } .bg-cancel { background: #ef4444; }

  header { background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  
  /* タブバー */
  .tab-bar { height: 65px; background: white; border-top: 1px solid #e2e8f0; display: flex; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
  .tab-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--gray); gap: 4px; }
  .tab-btn.active { color: var(--primary); font-weight: bold; }

  /* モーダル共通 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1000; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>

<header>
  <div style="font-weight: 800; color: #1e293b;">SalesCRM <span style="color:var(--primary)">Pro</span></div>
  <div id="syncStatus" style="font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px;">
    <div id="syncDot" style="width:8px; height:8px; border-radius:50%; background:#ccc;"></div> <span id="syncText">同期準備中</span>
  </div>
</header>

<div id="map-container">
  <div id="map"></div>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('map')">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6V22L8 18L16 22L23 18V2L16 6L8 2L1 6Z"/></svg>
    マップ
  </button>
  <button class="tab-btn" onclick="showTab('customers')">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21V19C17 17.9391 16.5786 17.0217 15.8284 16.2716C13.1 15.1H4.9C2.92174 15.5214 1 17.9391 1 21"/><circle cx="9" cy="7" r="4"/></svg>
    顧客
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANgJ4f6elnTMWW4sCbq4buAJ8aEfq8VW8",
    authDomain: "sales-crm-5940b.firebaseapp.com",
    projectId: "sales-crm-5940b",
    storageBucket: "sales-crm-5940b.appspot.com",
    messagingSenderId: "338914616223",
    appId: "1:338914616223:web:96e838e4a9e144a4999f81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // あなたの1,200行のロジックが正常に動くようにグローバルへ配置
  window._db = db;
  window._sync = { collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp };
  window.dispatchEvent(new CustomEvent('firebaseReady'));
</script>

<script>
let map, markers = {};
let isPinching = false;
let longPressTimer;

// 【バグ対策】ピンチズームと長押しを完全に分離
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 17, center: { lat: 35.744, lng: 139.851 }, disableDefaultUI: true, gestureHandling: 'greedy'
  });

  map.addListener('touchstart', (e) => {
    if (event.touches && event.touches.length > 1) {
      isPinching = true;
      clearTimeout(longPressTimer);
    } else {
      isPinching = false;
      longPressTimer = setTimeout(() => {
        if (!isPinching) handleMapLongPress(e.latLng);
      }, 750);
    }
  });
  map.addListener('dragstart', () => clearTimeout(longPressTimer));
}

function handleMapLongPress(latLng) {
  // 住所取得とモーダル表示（元の1,200行のロジックを呼び出す）
  console.log("長押し検知:", latLng.lat(), latLng.lng());
}

window.addEventListener('firebaseReady', () => {
  document.getElementById('syncDot').style.background = "#22c55e";
  document.getElementById('syncText').innerText = "同期中";
  // ここから元の1,200行の全ロジックがスタート
});

// マップ起動
const script = document.createElement('script');
script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyAxWhMGNnX0vFgpGwg_rFRlhBSr-5Q0UTE&callback=initMap`;
document.head.appendChild(script);
</script>

</body>
</html>
